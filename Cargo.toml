[workspace]
resolver = "2"
members = [
    "crates/gravity-sim-core",
    "crates/gravity-sim-app",
    "crates/gravity-sim-1pn",
]

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = { version = "1.1.2+spec-1.1.0", default-features = false, features = ["parse", "display", "serde"] }
rand = "0.10.1"
rayon = "1.12.0"
bytemuck = { version = "1.14", features = ["derive"] }
eframe = "0.34.1"
egui = "0.34.1"
egui-phosphor = { version = "0.12", default-features = false, features = ["regular", "fill"] }
wgpu = "29.0.1"
winit = "0.30.13"
pollster = "0.4.0"
proptest = "1.5"
approx = "0.5"
pretty_assertions = "1.4"
insta = { version = "1.39", features = ["json"] }
criterion = "0.8.2"
