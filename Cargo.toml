[package]
name = "gravity-sim"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = { version = "1.1.2+spec-1.1.0", default-features = false, features = ["parse"] }
eframe = "0.34.1"
egui = "0.34.1"
rand  = "0.10.1"
rayon = "1.12.0"
wgpu = "29.0.1"
winit = "0.30.13"
pollster = "0.4.0"
bytemuck = { version = "1.14", features = ["derive"] }