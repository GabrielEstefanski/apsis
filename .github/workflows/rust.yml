name: Rust CI

on:
  push:
    branches: ["master", "develop"]
  pull_request:
    branches: ["master", "develop"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ── Formatting + lint gate ───────────────────────────────────────────────
  # Fast feedback. Fails before the heavier jobs if the trivial things are
  # wrong.
  fmt-and-clippy:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Build + unit tests (debug) ───────────────────────────────────────────
  build-and-test:
    name: build + unit tests
    runs-on: ubuntu-latest
    needs: fmt-and-clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo build (workspace)
        run: cargo build --workspace --all-targets
      - name: cargo test --workspace
        run: cargo test --workspace

  # ── Examples compile ─────────────────────────────────────────────────────
  # Guards the Tier-1 public API: if any example stops compiling, something
  # the public API offered was withdrawn without being ported.
  examples-build:
    name: examples build
    runs-on: ubuntu-latest
    needs: fmt-and-clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-examples-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --workspace --examples

  # ── Core crate isolation ─────────────────────────────────────────────────
  # The paper claim "zero UI dependencies in the core library" is enforced
  # by compilation. Any accidental leak of egui/wgpu/eframe/winit/pollster
  # into apsis fails this step.
  core-isolation:
    name: core isolation (no UI deps)
    runs-on: ubuntu-latest
    needs: fmt-and-clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo tree must not mention UI crates
        run: |
          cargo tree -p apsis --edges normal > /tmp/core-tree.txt
          if grep -qE '\b(egui|wgpu|eframe|winit|pollster|egui-phosphor)\b' /tmp/core-tree.txt; then
            echo "::error::UI dependency leaked into apsis"
            cat /tmp/core-tree.txt
            exit 1
          fi
          echo "OK: core resolves no UI dependency"

  # ── Phase-3 gate: Mercury perihelion precession vs GR ────────────────────
  # The paper's central validation number. If this regresses below 1 %
  # agreement with General Relativity, CI fails — the result cited in the
  # paper is protected by a build step.
  mercury-gate:
    name: Phase-3 gate — Mercury perihelion (1PN vs GR)
    runs-on: ubuntu-latest
    needs: fmt-and-clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-gate-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo test --release (Mercury gate, --ignored)
        env:
          RUSTFLAGS: ""
        run: cargo test --release -p apsis-1pn --tests -- --ignored
