name: Rust CI

on:
  push:
  pull_request:
    branches: ["master", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ── Formatting + lint gate ───────────────────────────────────────────────
  # Fast feedback. Fails before the heavier jobs if the trivial things are
  # wrong.
  fmt-and-clippy:
    name: rustfmt + clippy
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: rui314/setup-mold@v1
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Build + unit tests ───────────────────────────────────────────────────
  build-and-test:
    name: build + unit tests
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    needs: fmt-and-clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
      - uses: taiki-e/install-action@nextest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo nextest run (workspace)
        run: cargo nextest run --workspace
      - name: cargo test --doc (nextest does not run doctests)
        run: cargo test --workspace --doc

  # ── Examples compile ─────────────────────────────────────────────────────
  # Guards the Tier-1 public API: if any example stops compiling, something
  # the public API offered was withdrawn without being ported.
  examples-build:
    name: examples build
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    needs: fmt-and-clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-examples-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --workspace --examples

  # ── Core crate isolation ─────────────────────────────────────────────────
  # The paper claim "zero UI dependencies in the core library" is enforced
  # by compilation. Any accidental leak of egui/wgpu/eframe/winit/pollster
  # into apsis fails this step.
  core-isolation:
    name: core isolation (no UI deps)
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    needs: fmt-and-clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo tree must not mention UI crates
        run: |
          cargo tree -p apsis --edges normal > /tmp/core-tree.txt
          if grep -qE '\b(egui|wgpu|eframe|winit|pollster|egui-phosphor)\b' /tmp/core-tree.txt; then
            echo "::error::UI dependency leaked into apsis"
            cat /tmp/core-tree.txt
            exit 1
          fi
          echo "OK: core resolves no UI dependency"

  # ── Python distribution build + lint + typecheck + tests ────────────────
  # Catches FFI link errors, module-name mismatches, and the PyO3
  # `add_submodule` / `sys.modules` registration regression that breaks
  # `from apsis.<operator> import X` even when attribute access works.
  # Also gates the Python surface against the lint + type-check + smoke
  # test set so stub drift and API regressions surface in CI rather than
  # at the next local run.
  python-build:
    name: python build + lint + typecheck + tests
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    needs: fmt-and-clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pybuild-${{ hashFiles('**/Cargo.lock') }}
      - name: create venv + maturin develop + dev deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install maturin
          maturin develop --release
          pip install ruff mypy pyright pytest
      - name: ruff check
        run: |
          . .venv/bin/activate
          ruff check apsis/ python-tests/
      - name: mypy
        run: |
          . .venv/bin/activate
          mypy apsis/ python-tests/
      - name: pyright
        run: |
          . .venv/bin/activate
          pyright apsis/ python-tests/
      - name: pytest python-tests/
        run: |
          . .venv/bin/activate
          pytest python-tests/
      - name: from apsis import + per-operator import
        run: |
          . .venv/bin/activate
          python -c "import apsis; print('apsis', apsis.__version__)"
          python -c "from apsis.gr import PostNewtonian1PN, C_SOLAR_UNITS; assert C_SOLAR_UNITS > 1e4"
          python -c "from apsis.radiation import RadiationPressure"
          python -c "from apsis.central import CentralForce"
          python -c "import apsis; from apsis.gr import PostNewtonian1PN; \
            p = PostNewtonian1PN.for_units(units=apsis.units.SOLAR_CANONICAL); \
            assert isinstance(p, apsis.Perturbation)"
      - name: examples run
        run: |
          . .venv/bin/activate
          python python-examples/mercury_perihelion.py
          python python-examples/radiation_dust.py
          python python-examples/central_precession.py
          python python-examples/federation_composition.py
          python python-examples/implicit_midpoint.py

  # ── Release-mode validation: Mercury 1PN vs GR ───────────────────────────
  # Headline physics gate. Mercury 1PN reproduces the GR perihelion
  # precession; this job runs the assertion in release mode at the
  # threshold the paper claims. Future release-mode validations (drag,
  # J2, …) attach to this job so the workflow surface stays compact.
  mercury-gate:
    name: release validation (mercury 1PN vs GR)
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    needs: fmt-and-clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
      - uses: taiki-e/install-action@nextest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-gate-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo nextest run --release -p apsis-1pn --run-ignored only
        env:
          RUSTFLAGS: ""
        run: cargo nextest run --release -p apsis-1pn --tests --run-ignored only

  # ── recommended_dt heuristic gate ─────────────────────────────────────────
  # Runs the validation harness for the `recommended_dt` utility function.
  # Catches regressions in the heuristic shape or in template ICs that
  # would push any gated (scenario × VV/Y4) cell past its conservation bound.
  recommended-dt-gate:
    name: release validation (recommended_dt heuristic)
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    needs: fmt-and-clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-recdt-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo run recommended_dt_validation
        env:
          RUSTFLAGS: ""
        run: cargo run --release --example recommended_dt_validation -p apsis --quiet
      - name: cargo run recommended_dt_compare
        env:
          RUSTFLAGS: ""
        run: cargo run --release --example recommended_dt_compare -p apsis --quiet
